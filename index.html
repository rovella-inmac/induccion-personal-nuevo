<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inducción Personal Nuevo · Consorcio Rovella-INMAC</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- ====== Escenario 16:9 ====== -->
  <div id="stage">
    <div id="viewport">
      <!-- Las <img> de cada diapositiva se inyectan por JS -->

      <!-- Contenedor del video de Vimeo (diapositiva 06) -->
      <div id="videoWrap">
        <iframe id="vimeoPlayer"
          src="https://player.vimeo.com/video/1203561984?badge=0&amp;autopause=0&amp;player_id=0&amp;app_id=58479"
          frameborder="0"
          allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share"
          referrerpolicy="strict-origin-when-cross-origin"
          title="Video inducción"></iframe>
      </div>
    </div>
  </div>

  <!-- Zona invisible: revela la barra lateral al acercar el mouse al borde -->
  <div id="edgeReveal"></div>

  <!-- ====== Barra lateral flotante de controles ====== -->
  <aside id="sidebar" aria-label="Controles de la presentación">
    <button class="btn" id="btnPlay" title="Reproducir" aria-label="Reproducir">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <button class="btn" id="btnStop" title="Detener" aria-label="Detener">
      <svg viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>
    </button>
    <button class="btn" id="btnRestart" title="Reiniciar audio" aria-label="Reiniciar audio">
      <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7a6 6 0 11-6 6H4a8 8 0 108-8z"/></svg>
    </button>

    <div class="divider"></div>

    <button class="btn" id="btnPrev" title="Diapositiva anterior" aria-label="Diapositiva anterior">
      <svg viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6V6z"/></svg>
    </button>
    <button class="btn" id="btnNext" title="Diapositiva siguiente" aria-label="Diapositiva siguiente">
      <svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6V6z"/></svg>
    </button>

    <div class="divider"></div>

    <button class="btn" id="btnMute" title="Activar / desactivar sonido" aria-label="Silenciar">
      <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3a4.5 4.5 0 00-2.5-4v8a4.5 4.5 0 002.5-4zM14 3.2v2.1a7 7 0 010 13.4v2.1a9 9 0 000-17.6z"/></svg>
    </button>
    <div class="volume-wrap">
      <input type="range" id="volume" min="0" max="1" step="0.05" value="1"
             title="Volumen" aria-label="Volumen">
    </div>

    <div class="divider"></div>

    <button class="btn" id="btnAuto" title="Reproducción automática" aria-label="Reproducción automática">
      <svg viewBox="0 0 24 24"><path d="M12 4V1L8 5l4 4V6a6 6 0 11-6 6H4a8 8 0 108-8zm-1 4h2v5l4 2-.8 1.6L11 14V8z"/></svg>
    </button>
    <button class="btn" id="btnFull" title="Pantalla completa" aria-label="Pantalla completa">
      <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
    </button>
  </aside>

  <!-- ====== Indicadores ====== -->
  <div id="hud">
    <span id="counter">1 / 20</span>
    <div id="progressTrack"><div id="progressBar"></div></div>
    <span class="badge" id="modeBadge">
      <span class="dot"></span><span id="modeStatus">Automático</span>
    </span>
    <span class="badge" id="audioBadge">
      <span class="dot"></span><span id="audioStatus">Pausado</span>
    </span>
  </div>

  <!-- SDK de Vimeo + lógica -->
  <script src="https://player.vimeo.com/api/player.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
